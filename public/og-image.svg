  <circle cx="788" cy="98" r="6" fill="#ff5f56"/>
  <circle cx="808" cy="98" r="6" fill="#ffbd2e"/>
  <circle cx="828" cy="98" r="6" fill="#27c93f"/>

  <g font-family="'Courier New', monospace" font-size="13">
    <text x="784" y="144" fill="#666666">// RAG Pipeline</text>
    <text x="784" y="168" fill="#00bfff">class </text>
    <text x="832" y="168" fill="#ffffff">RecommendationService</text>
    <text x="784" y="192" fill="#a0a0a0">  embed(query)</text>
    <text x="784" y="216" fill="#a0a0a0">    → vectorSearch(HNSW)</text>
    <text x="784" y="240" fill="#a0a0a0">    → rerank(GPT-4o-mini)</text>
    <text x="784" y="264" fill="#a0a0a0">    → cache(15min TTL)</text>
    <text x="784" y="304" fill="#666666">// Hybrid Search</text>
    <text x="784" y="328" fill="#00ff88">RRF</text>
    <text x="814" y="328" fill="#a0a0a0">.fuse(</text>
    <text x="784" y="352" fill="#a0a0a0">  vectorSearch,</text>
    <text x="784" y="376" fill="#a0a0a0">  keywordSearch</text>
    <text x="784" y="400" fill="#a0a0a0">)</text>
